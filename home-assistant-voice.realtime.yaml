# ============================================================================
# Home Assistant Voice PE - OpenAI Realtime firmware.
# Our customized thin-client: all voice logic lives in the va_client component
# (pulled from GitHub), streaming audio to the OpenAI Realtime backend add-on.
#
# This config is meant to be pulled as a remote ESPHome `packages:` include from
# a small per-device stub, so updates are one click in the dashboard (no more
# copy-pasting the whole file). The stub provides the device identity + secrets
# as SUBSTITUTIONS (a remote package can't use !secret):
#   name, friendly_name, wifi_ssid, wifi_password, ota_password, api_key
#   (+ static_ip/gateway/subnet/dns1/dns2 and a manual_ip override for a fixed IP)
# See esphome-builder.dhcp.yaml in this repo for the stub template.
# ============================================================================
substitutions:
  # Device identity comes from the per-device stub (esphome-builder.dhcp.yaml); these
  # are safe defaults the stub overrides. Wi-Fi + secrets (wifi_ssid, wifi_password,
  # ota_password, api_key) MUST be provided by the stub as substitutions, because
  # a remote `packages:` include can't use !secret.
  name: home-assistant-voice
  friendly_name: Home Assistant Voice

  # Phases of the Voice Assistant
  # The voice assistant is ready to be triggered by a wake word
  voice_assist_idle_phase_id: '1'
  # The voice assistant is waiting for a voice command (after being triggered by the wake word)
  voice_assist_waiting_for_command_phase_id: '2'
  # The voice assistant is listening for a voice command
  voice_assist_listening_for_command_phase_id: '3'
  # The voice assistant is currently processing the command
  voice_assist_thinking_phase_id: '4'
  # The voice assistant is replying to the command
  voice_assist_replying_phase_id: '5'
  # The voice assistant is not ready
  voice_assist_not_ready_phase_id: '10'
  # The voice assistant encountered an error
  voice_assist_error_phase_id: '11'
  # Change this to true in case you ahve a hidden SSID at home.
  hidden_ssid: "false"
  # Substitutions for audio files
  jack_connected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_connected.flac
  jack_disconnected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_disconnected.flac
  mute_switch_on_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  timer_finished_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  wake_word_triggered_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
  center_button_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
  center_button_double_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
  center_button_triple_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
  center_button_long_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
  factory_reset_confirmed_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_confirmed.mp3
  easter_egg_tick_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/easter_egg_tick.mp3
  easter_egg_tada_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/easter_egg_tada.mp3
  error_cloud_expired_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3
  # WebSocket endpoint of the "OpenAI Realtime Voice Agent" Home Assistant
  # add-on (this fork's backend). The add-on runs with host_network and
  # listens on port 8080. homeassistant.local resolves via mDNS on the LAN;
  # change this if your HA host has a different name/IP, e.g.
  # "ws://192.168.1.10:8080/".
  va_url: "ws://homeassistant.local:8080/"
  # (device→add-on WebSocket needs no auth token; it's a LAN-local service.)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  # Project identity drives the ESPHome dashboard "Update available" badge: bump
  # `version` on a release (merge to main) and adopted devices are offered it.
  project:
    name: "xandervanerven.voice-pe-openai-realtime"
    version: "1.0.0"
  min_version: 2026.5.0
  on_boot:
    priority: 375
    then:
      # Run the script to refresh the LED status
      - script.execute: control_leds
      - delay: 1s
      - switch.turn_on: internal_speaker_amp
      # va-direct: original on_client_connected did clear-init + start-mww +
      # phase=idle. clear-init + phase=idle stay here; micro_wake_word.start
      # moved to api.on_client_connected (see above) because on_boot+1s raced
      # the XMOS voice-kit and mWW never heard the mic. The control_leds
      # dispatcher routes to no_ha_connection (red twinkle) until both wifi and
      # va_client WS come up — then it falls through to the idle phase naturally.
      - lambda: id(init_in_progress) = false;
      # Seed va_client with the restored media_player volume so the first
      # TTS reply respects the user's volume setting instead of blasting
      # at 100% until they touch the +/- buttons.
      - lambda: |-
          id(va).set_volume(id(external_media_player).is_muted() ? 0.0f
                                                                 : id(external_media_player).volume);
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: control_leds
      # If after 10 minutes, the device is still initializing (It did not yet connect to Home Assistant), turn off the init_in_progress variable and run the script to refresh the LED status
      - delay: 10min
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: control_leds

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

wifi:
  id: wifi_id
  fast_connect: ${hidden_ssid}
  # CRACKLE FIX (secondary): disable WiFi modem light-sleep. ESPHome's default
  # power_save_mode on ESP32 batches RX while the radio dozes, adding periodic
  # latency to incoming WS audio frames (the sub-second "ws audio gap" warnings).
  # none = radio always on → steadier frame arrival, fewer jitter-driven dropouts
  # during replies. Costs ~20-40mA extra (this device is mains-powered, so fine).
  power_save_mode: none
  # Credentials from secrets.yaml (no improv needed for normal use); the device
  # gets its IP from DHCP. The improv/AP blocks below stay as a fallback for re-setup.
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "Voice PE Setup"
  on_connect:
    - delay: 5s  # give improv results time to transmit
    - ble.disable:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
    # Enable/disable Sendspin static adjustment delay if the jack is plugged in or not
    - if:
        condition:
          - binary_sensor.is_on: jack_plugged
        then:
          - sendspin.media_source.enable_static_delay_adjustment:
        else:
          - sendspin.media_source.disable_static_delay_adjustment:
  on_disconnect:
    - script.execute: control_leds

network:
  enable_ipv6: true

logger:
  level: DEBUG
  logs:
    sensor: WARN  # avoids logging debug sensor updates


ota:
  - platform: esphome
    id: ota_esphome
    # OTA upload password (from the stub's ota_password substitution -> secrets.yaml).
    password: ${ota_password}

# va-direct fork: api re-enabled so this device shows up in Home Assistant
# again (entities, OTA discovery, and diagnostics readable from HA). Voice
# audio still flows over the va_client WebSocket and tools via the MCP server
# on the backend — api only manages/observes the device itself. With api on,
# ESPHome advertises _esphomelib over mDNS automatically, so the old manual
# mdns workaround is no longer needed.
api:
  encryption:
    key: ${api_key}
  # va-direct: start micro_wake_word HERE (mirrors stock home-assistant-voice.yaml
  # and the fjfricke reference) instead of on_boot. Starting mWW at on_boot+1s
  # raced the XMOS voice-kit coming up, so mWW could begin reading a mic that
  # wasn't streaming yet and never recover — the wake word silently never fired.
  # on_client_connected runs once HA + WiFi + the audio path are fully up.
  on_client_connected:
    - micro_wake_word.start:
    # Keep "stop" disabled in the resting/idle state; on_phase arms it only while
    # the assistant is replying. Explicit here so the boot state is deterministic
    # regardless of whether the HA api or the va_client WS connects first.
    - micro_wake_word.disable_model: stop
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

# Diagnostics surfaced to Home Assistant (so they can be read remotely without
# a serial cable): the last reset reason (e.g. "Task watchdog" / "Software" /
# "Power on") and the current voice-assistant phase.
text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset reason"
      entity_category: diagnostic
    device:
      name: "Device info"
      entity_category: diagnostic
  - platform: template
    name: "Voice phase"
    id: voice_phase_text
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      switch (id(voice_assistant_phase)) {
        case ${voice_assist_idle_phase_id}: return std::string("idle");
        case ${voice_assist_waiting_for_command_phase_id}: return std::string("waiting");
        case ${voice_assist_listening_for_command_phase_id}: return std::string("listening");
        case ${voice_assist_thinking_phase_id}: return std::string("thinking");
        case ${voice_assist_replying_phase_id}: return std::string("replying");
        case ${voice_assist_not_ready_phase_id}: return std::string("not_ready");
        case ${voice_assist_error_phase_id}: return std::string("error");
        default: return std::string("unknown");
      }

# va-direct: WiFi provisioning blocks moved out of factory.yaml into the main
# config since we don't use the upstream two-tier factory build.
improv_serial:

esp32_ble:
  name: ha-voice-pe

esp32_improv:
  authorizer: center_button
  on_start:
    - lambda: id(improv_ble_in_progress) = true;
    - script.execute: control_leds
  on_provisioned:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
  on_stop:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false  # The VPE has PSRAM, so this is safe. Allows configuring WiFi driver to use more resources (done automatically by the speaker media player)

globals:
  # Global index for our LEDs. So that switching between different animation does not lead to unwanted effects.
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  # Global initialization variable. Initialized to true and set to false once everything is connected. Only used to have a smooth "plugging" experience
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  # Global variable storing the state of ImprovBLE. Used to draw different LED animations
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking the phase of the voice assistant (defined above). Initialized to not_ready
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  # Global variable tracking if the dial was recently touched.
  - id: dial_touched
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the LED color was recently changed.
  - id: color_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the group media player volume was recent changed.
  - id: group_volume_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been plugged touched.
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been unplugged touched.
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable storing the first active timer
  # TODO va-direct: was voice_assistant::Timer — that type lives in the HA voice_assistant component
  # which we removed. Replace with bool placeholder until va_client exposes timer info.
  - id: first_active_timer
    type: bool
    restore_value: false
    initial_value: 'false'
  # Global variable storing if a timer is active
  - id: is_timer_active
    type: bool
    restore_value: false
  # Global variable storing if a factory reset was requested. If it is set to true, the device will factory reset once the center button is released
  - id: factory_reset_requested
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  # This is the master mute switch. It is exposed to Home Assistant. The user can only turn it on and off if the hardware switch is off. (The hardware switch overrides the software one)
  - platform: template
    id: master_mute_switch
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:microphone-off"
    name: Mute
    entity_category: config
    lambda: |-
      // Muted either if the hardware mute switch is on or the microphone's software mute switch is enabled
      if (id(hardware_mute_switch).state || id(i2s_mics).get_mute_state()) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.mute:
    turn_off_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.unmute:
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds
  # Wake Word Sound Switch.
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Internal switch to track when a timer is ringing on the device.
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Disable stop wake word
      - micro_wake_word.disable_model: stop
      - script.execute: disable_repeat
      # Stop any current announcement (ie: stop the timer ring mid playback)
      - if:
          condition:
            media_player.is_announcing:
              id: external_media_player
          then:
            media_player.stop:
              announcement: true
              id: external_media_player
      # Set back ducking ratio to zero
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      # Refresh the LED ring
      - script.execute: control_leds
    on_turn_on:
      # Duck audio
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      # Enable stop wake word
      - micro_wake_word.enable_model: stop
      # Ring timer
      - script.execute: ring_timer
      # Refresh LED
      - script.execute: control_leds
      # If 15 minutes have passed and the timer is still ringing, stop it.
      - delay: 15min
      - switch.turn_off: timer_ringing
  - platform: gpio
    pin: GPIO47
    id: internal_speaker_amp
    name: "Internal speaker amp"
    entity_category: config
    restore_mode: ALWAYS_OFF
    internal: true

binary_sensor:
  # Center Button. Used for many things (See on_multi_click)
  - platform: gpio
    id: center_button
    pin:
      number: GPIO0
      inverted: true
    on_press:
      - script.execute: control_leds
    on_release:
      - script.execute: control_leds
      # If a factory reset is requested, factory reset on release
      - if:
          condition:
            lambda: return id(factory_reset_requested);
          then:
            - button.press: factory_reset_button
    on_multi_click:
      # Simple Click:
      #   - Abort "things" in order
      #     - Timer
      #     - Announcements
      #     - Voice Assistant Pipeline run
      #     - Music
      #   - Starts the voice assistant if it is not yet running and if the device is not muted.
      - timing:
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - if:
                    condition:
                      switch.is_on: timer_ringing
                    then:
                      - switch.turn_off: timer_ringing
                    else:
                      - if:
                          condition:
                            media_player.is_announcing:
                              id: external_media_player
                          then:
                            media_player.stop:
                              announcement: true
                              id: external_media_player
                          else:
                            - if:
                                condition:
                                  media_player.is_playing:
                                    id: external_media_player
                                then:
                                  - media_player.pause:
                                      id: external_media_player
                                else:
                                  # If a va_client session is already in flight
                                  # (any non-idle phase: waiting/listening/
                                  # thinking/replying) — treat this press as
                                  # "cancel". No wake chime, no new session.
                                  # Otherwise: fresh start.
                                  - if:
                                      condition:
                                        lambda: 'return id(voice_assistant_phase) != ${voice_assist_idle_phase_id};'
                                      then:
                                        - lambda: 'id(va)->send_interrupt();'
                                        - speaker.stop:
                                            id: media_resampling_speaker
                                        - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
                                        - script.execute: control_leds
                                      else:
                                        - if:
                                            condition:
                                              switch.is_off: master_mute_switch
                                            then:
                                              - script.execute:
                                                  id: play_sound
                                                  priority: true
                                                  sound_file: "center_button_press_sound"
                                              - wait_until:
                                                  condition:
                                                    not:
                                                      media_player.is_announcing:
                                                        id: external_media_player
                                                  timeout: 2s
                                              - delay: 600ms
                                              - lambda: 'id(va)->start_session();'
                                              - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
                                              - script.execute: control_leds
      # Double Click
      #  . Exposed as an event entity. To be used in automations inside Home Assistant
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: "center_button_double_press_sound"
                - event.trigger:
                    id: button_press_event
                    event_type: "double_press"
      # Triple Click
      #  . Exposed as an event entity. To be used in automations inside Home Assistant
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: "center_button_triple_press_sound"
                - event.trigger:
                    id: button_press_event
                    event_type: "triple_press"
      # Long Press
      #  . Exposed as an event entity. To be used in automations inside Home Assistant
      - timing:
          - ON for at least 1s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: "center_button_long_press_sound"
                - light.turn_off: voice_assistant_leds
                - event.trigger:
                    id: button_press_event
                    event_type: "long_press"
      # Very important do not remove. Trust me :D
      - timing:
          # H ....
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0.5s to 2s
          # A ._
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for 0.2s to 2s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Tick"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "easter_egg_tick_sound"
                - delay: 4s
                - light.turn_off: voice_assistant_leds
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "easter_egg_tada_sound"
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Rainbow"
                - event.trigger:
                    id: button_press_event
                    event_type: "easter_egg_press"
      # Factory Reset Warning
      #  . Audible and Visible warning.
      - timing:
          - ON for at least 10s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Factory Reset Coming Up"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_initiated_sound"
                - wait_until:
                    binary_sensor.is_off: center_button
                - if:
                    condition:
                      lambda: return !id(factory_reset_requested);
                    then:
                      - light.turn_off: voice_assistant_leds
                      - script.execute:
                          id: play_sound
                          priority: true
                          sound_file: "factory_reset_cancelled_sound"
      # Factory Reset Confirmed.
      #  . Audible warning to prompt user to release the button
      #  . Set factory_reset_requested to true
      - timing:
          - ON for at least 22s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_confirmed_sound"
                - light.turn_on:
                    brightness: 100%
                    red: 100%
                    green: 0%
                    blue: 0%
                    id: voice_assistant_leds
                    effect: "none"
                - lambda: id(factory_reset_requested) = true;

  # Hardware mute switch (Side of the device)
  - platform: gpio
    id: hardware_mute_switch
    internal: true
    pin: GPIO3
    on_press:
      # Play mute on sound only if software mute isn't enabled
      - if:
          condition:
            - switch.is_off: master_mute_switch
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: "mute_switch_on_sound"
    on_release:
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "mute_switch_off_sound"
      - microphone.unmute:
  # Audio Jack Plugged sensor
  - platform: gpio
    id: jack_plugged
    # Debouncing it a bit because it can be activated back and forth as you plug the audio jack
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    pin:
      number: GPIO17
    # When the jack is plugged in:
    #  - LED animation
    #  - Enable Sendspin static delay adjustment to apply the persisted delay when using the external audio output
    #  - Sound played
    on_press:
      - lambda: id(jack_plugged_recently) = true;
      - sendspin.media_source.enable_static_delay_adjustment:
      - script.execute: control_leds
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "jack_connected_sound"
      - delay: 800ms
      - lambda: id(jack_plugged_recently) = false;
      - script.execute: control_leds
    # When the jack is unplugged:
    #  - LED animation
    #  - Disable Sendspin static delay adjustment when using the internal speaker
    #  - Sound played
    on_release:
      - lambda: id(jack_unplugged_recently) = true;
      - script.execute: control_leds
      - sendspin.media_source.disable_static_delay_adjustment:
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "jack_disconnected_sound"
      - delay: 800ms
      - lambda: id(jack_unplugged_recently) = false;
      - script.execute: control_leds

light:
  # Hardware LED ring. Not used because remapping needed
  - platform: esp32_rmt_led_strip
    id: leds_internal
    pin: GPIO21
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 12
    rgb_order: GRB
    rmt_symbols: 192
    default_transition_length: 0ms
    power_supply: led_power

  # Voice Assistant LED ring. Remapping of the internal LED.
  # This light is not exposed. The device controls it
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 7
        to: 11
      - id: leds_internal
        from: 0
        to: 6
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;
      - addressable_lambda:
          name: "Thinking"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 50ms
          lambda: |-
            id(global_led_animation_index) = (12 + id(global_led_animation_index) - 1) % 12;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == (id(global_led_animation_index)) % 12) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 1) % 12) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 2) % 12) {
                it[i] = color * 128;
              } else if (i == ( id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 7) % 12) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 8) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color muted_color(255, 0, 0);
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if ( light_color.get_state() ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if ( id(master_mute_switch).state ) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            if ( id(external_media_player).volume == 0.0f || id(external_media_player).is_muted() ) {
              it[5] = Color::BLACK;
              it[6] = muted_color;
              it[7] = Color::BLACK;
            }
      - addressable_lambda:
          name: "Voice kit startup failed"
          # update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color fail_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              if (i % 3) {
                it[i] = Color::BLACK;
              } else {
                it[i] = fail_color;
              }
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = 12.0f * id(external_media_player).volume;
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= volume_ratio) {
                it[(6+i)%12] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[(6+i)%12] = Color::BLACK;
              }
            }
            if (id(external_media_player).volume == 0.0f) {
              it[6] = silenced_color;
            }
      - addressable_lambda:
          name: "Center Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if ( id(master_mute_switch).state ) {
              it[3] = muted_color;
              it[9] = muted_color;
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            // TODO va-direct: this effect rendered a countdown ring driven by
            // voice_assistant::Timer.seconds_left / .total_seconds. We removed
            // the VA component, so first_active_timer is a bool placeholder.
            // Render all-black until va_client owns timers (post-MVP).
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            auto timer_ratio = 0.0f;
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (uint8_t i = 0; i < 12; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 12 && i != last_led_on ) ? 0.9f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            id(global_led_animation_index) = (12 + id(global_led_animation_index) - 1) % 12;
      - addressable_rainbow:
          name: "Rainbow"
          width: 12
      - addressable_lambda:
          name: "Tick"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = (index + 1) % 12;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 1s
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 12;
      - addressable_lambda:
          name: "Jack Plugged"
          update_interval: 40ms
          lambda: |-
            static uint8_t index = 0;
            if (initial_run) {
              index = 0;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            if (index <= 6) {
              for (uint8_t i = 0; i < 12; i++) {
                if (i == index) {
                  it[i] = color;
                } else if (i == (12 - index) % 12) {
                  it[i] = color;
                } else {
                  it[i] = Color::BLACK;
                }
              }
            }
            index = (index + 1);
      - addressable_lambda:
          name: "Jack Unplugged"
          update_interval: 40ms
          lambda: |-
            static uint8_t index = 0;
            if (initial_run) {
              index = 0;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            if (index <= 6) {
              for (uint8_t i = 0; i < 12; i++) {
                if (i == 6 - index) {
                  it[i] = color;
                } else if (i == (6 + index) % 12) {
                  it[i] = color;
                } else {
                  it[i] = Color::BLACK;
                }
              }
            }
            index = (index + 1);

      # va-direct: blue breathing pulse for the connected+idle state (lifted from
      # the fjfricke reference firmware). Referenced by
      # control_leds_voice_assistant_idle_phase so the ring glows while the
      # va_client WebSocket is connected.
      - addressable_lambda:
          name: "Active Pulse"
          update_interval: 50ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_increasing = true;
            static uint8_t brightness_steps = 20;
            if (initial_run) {
              brightness_step = 0;
              brightness_increasing = true;
            }
            Color blue(0, 0, 255);
            uint8_t brightness = (brightness_step * 255) / brightness_steps;
            Color pulse_color = blue * brightness;
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = pulse_color;
            }
            if (brightness_increasing) {
              brightness_step++;
              if (brightness_step >= brightness_steps) {
                brightness_increasing = false;
              }
            } else {
              brightness_step--;
              if (brightness_step == 0) {
                brightness_increasing = true;
              }
            }

  # User facing LED ring. Remapping of the internal LEDs.
  # Exposed to be used by the user.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:circle-outline"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    # Re-render the device LEDs when this entity is toggled from HA: the idle
    # "Active Pulse" is gated on this light's state, and without a refresh the
    # running effect would keep overwriting the strip until the next phase
    # change. on_turn_on/off only fire on real transitions, so the re-assert
    # inside control_leds (turn_on while already on) can't loop back here.
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: leds_internal
        from: 7
        to: 11
      - id: leds_internal
        from: 0
        to: 6

power_supply:
  - id: led_power
    pin: GPIO45

sensor:
  # The dial. Used to control volume and Hue of the LED ring.
  - platform: rotary_encoder
    id: dial
    pin_a: GPIO16
    pin_b: GPIO18
    resolution: 2
    on_clockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: center_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: true
          else:
            # TODO va-direct: sendspin_group_media_player branch dropped (no media_player); always control hue.
            - script.execute:
                id: control_hue
                increase_hue: true
    on_anticlockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: center_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: false
          else:
            # TODO va-direct: sendspin_group_media_player branch dropped (no media_player); always control hue.
            - script.execute:
                id: control_hue
                increase_hue: false

event:
  # Event entity exposed to the user to automate on complex center button presses.
  # The simple press is not exposed as it is used to control the device itself.
  - platform: template
    id: button_press_event
    name: "Button press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - double_press
      - triple_press
      - long_press
      - easter_egg_press

script:
  # Master script controlling the LEDs, based on different conditions : initialization in progress, wifi and api connected and voice assistant phase.
  # For the sake of simplicity and re-usability, the script calls child scripts defined below.
  # This script will be called every time one of these conditions is changing.
  - id: control_leds
    then:
      - lambda: |
          if (id(voice_kit_component).is_failed()) {
            id(control_leds_voice_kit_startup_failed).execute();
            return;
          }
          id(check_if_timers_active).execute();
          if (id(is_timer_active)){
            id(fetch_first_active_timer).execute();
          }
          if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(va)->is_connected()) {
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(center_button).state) {
            id(control_leds_center_button_touched).execute();
          } else if (id(jack_plugged_recently)) {
            id(control_leds_jack_plugged_recently).execute();
          } else if (id(jack_unplugged_recently)) {
            id(control_leds_jack_unplugged_recently).execute();
          } else if (id(dial_touched)) {
            id(control_leds_dial_touched).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(master_mute_switch).state) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(external_media_player).volume == 0.0f || id(external_media_player).is_muted()) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  # Script executed if voice_kit startup failed
  # Static red "X"
  - id: control_leds_voice_kit_startup_failed
    then:
      - light.turn_on:
          brightness: 40%
          red: 0%
          green: 0%
          blue: 0%
          id: voice_assistant_leds
          effect: "Voice kit startup failed"

  # Script executed during Improv BLE
  # Warm White Twinkle
  - id: control_leds_improv_ble_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 100%
          green: 89%
          blue: 71%
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed during initialization
  # Blue Twinkle if Wifi is connected, Else solid warm white
  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                brightness: 66%
                red: 9.4%
                green: 73.3%
                blue: 94.9%
                id: voice_assistant_leds
                effect: "Twinkle"
          else:
            - light.turn_on:
                brightness: 66%
                red: 100%
                green: 89%
                blue: 71%
                id: voice_assistant_leds
                effect: "none"

  # Script executed when the device has no connection to Home Assistant
  # Red Twinkle (This will be visible during HA updates for example)
  - id: control_leds_no_ha_connection_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the voice assistant is idle (waiting for a wake word)
  # Nothing (Either LED ring off or LED ring on if the user decided to turn the user facing LED ring on)
  - id: control_leds_voice_assistant_idle_phase
    then:
      # va-direct: when the va_client WebSocket is connected, show a gentle blue
      # breathing pulse at idle so there's a visible "ready" state (as the user
      # wants, like the reference firmware) — but ONLY while the user-facing
      # "LED Ring" light entity is ON. The pulse used to ignore that entity's
      # on/off state (it only read its brightness), and since the effect
      # re-renders every 50 ms it instantly overwrote any turn-off coming from
      # HA — the HA switch appeared broken. Entity off = device dark at rest,
      # like stock. When the WS is down, keep the stock behaviour too: ring off
      # unless the user manually turned on the led_ring light.
      - if:
          condition:
            and:
              - lambda: 'return id(va)->is_connected();'
              - light.is_on: led_ring
          then:
            - light.turn_on:
                id: voice_assistant_leds
                brightness: !lambda 'return max(id(led_ring).current_values.get_brightness(), 0.2f);'
                effect: "Active Pulse"
          else:
            - light.turn_off: voice_assistant_leds
            - if:
                condition:
                  light.is_on: led_ring
                then:
                  - light.turn_on: led_ring

  # Script executed when the voice assistant is waiting for a command (After the wake word)
  # Slow clockwise spin of the LED ring.
  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Waiting for Command"

  # Script executed when the voice assistant is listening to a command
  # Fast clockwise spin of the LED ring.
  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Listening For Command"

  # Script executed when the voice assistant is thinking to a command
  # The spin stops and the 2 LEDs that are currently on and blinking indicating the commend is being processed.
  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Thinking"

  # Script executed when the voice assistant is thinking to a command
  # Fast anticlockwise spin of the LED ring.
  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Replying"

  # Script executed when the voice assistant is in error
  # Fast Red Pulse
  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Error"

  # Script executed when the voice assistant is muted or silent
  # The LED next to the 2 microphones turn red / one red LED next to the speaker grill
  - id: control_leds_muted_or_silent
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Muted or Silent"

  # Script executed when the voice assistant is not ready
  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the dial is touched
  # A number of LEDs turn on indicating a visual representation of the volume of the media player entity.
  - id: control_leds_dial_touched
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Volume Display"

  # Script executed when the jack has just been unplugged
  # A ripple effect
  - id: control_leds_jack_unplugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Jack Unplugged"

  # Script executed when the jack has just been plugged
  # A ripple effect
  - id: control_leds_jack_plugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Jack Plugged"

  # Script executed when the center button is touched
  # The complete LED ring turns on
  - id: control_leds_center_button_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Center Button Touched"

  # Script executed when the timer is ringing, to control the LEDs
  # The LED ring blinks.
  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer Ring"

  # Script executed when the timer is ticking, to control the LEDs
  # The LEDs shows the remaining time as a fraction of the full ring.
  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Timer tick"

  # Script executed when the volume is increased/decreased from the dial
  - id: control_volume
    mode: restart
    parameters:
      increase_volume: bool  # True: Increase volume / False: Decrease volume.
    then:
      - delay: 16ms
      - if:
          condition:
            lambda: return increase_volume;
          then:
            - media_player.volume_up:
                id: external_media_player
          else:
            - media_player.volume_down:
                id: external_media_player
      - script.execute: control_leds
      - delay: 1s
      - lambda: id(dial_touched) = false;
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds

  # Script executed when the volume is increased/decreased from the dial for the group media player
  - id: control_group_volume
    mode: restart
    parameters:
      increase_volume: bool  # True: Increase volume / False: Decrease volume.
    then:
      - delay: 16ms
      # TODO va-direct: no sendspin_group_media_player; group volume not supported.
      - lambda: id(group_volume_changed) = true;
      - script.execute: control_leds
      - delay: 1s
      - lambda: id(dial_touched) = false;
      - lambda: id(group_volume_changed) = false;
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds

  # Script executed when the hue is increased/decreased from the dial
  - id: control_hue
    mode: restart
    parameters:
      increase_hue: bool  # True: Increase hue / False: Decrease hue.
    then:
      - delay: 16ms
      - if:
          condition:
            lambda: return(abs(int(id(dial).state)) > 3 || id(color_changed));
          then:
            - lambda: |
                id(color_changed) = true;
                auto light_color = id(voice_assistant_leds).current_values;
                int hue = 0;
                float saturation = 0;
                float value = 0;
                rgb_to_hsv( light_color.get_red(),
                            light_color.get_green(),
                            light_color.get_blue(),
                            hue,
                            saturation,
                            value);
                if (increase_hue) {
                  hue = (hue + 10) % 360;
                } else {
                  hue = (hue + 350) % 360;
                }
                if (saturation < 0.05) {
                  saturation = 1;
                }
                float red = 0;
                float green = 0;
                float blue = 0;
                hsv_to_rgb( hue,
                            saturation,
                            value,
                            red,
                            green,
                            blue);
                id(voice_assistant_leds).make_call().set_rgb(red, green, blue).perform();
      - wait_until:
          binary_sensor.is_off: center_button
      - lambda: |
          id(dial_touched) = false;
          // now we "save" the new LED color/state to led_ring, maintaining its brightness and state
          auto led_ring_call = id(led_ring).make_call();
          auto va_leds_cv = id(voice_assistant_leds).current_values;
          led_ring_call.from_light_color_values(va_leds_cv);
          led_ring_call.set_brightness(id(led_ring).current_values.get_brightness());
          led_ring_call.set_state(id(led_ring).current_values.is_on());
          led_ring_call.perform();
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds
      - delay: 500ms
      - lambda: id(color_changed) = false;

  # Script executed when the timer is ringing, to playback sounds.
  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: "timer_finished_sound"

  - id: enable_repeat_one
    then:
      # Turn on the repeat mode and pause for 500 ms between playlist items/repeats
      - media_player.repeat_one:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 500ms

  - id: disable_repeat
    then:
      # Turn off the repeat mode and pause for 0 ms between playlist items/repeats
      - media_player.repeat_off:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 0ms

  # Script executed when we want to play sounds on the device.
  # va-direct: restored verbatim from original. Routes through
  # external_media_player → announcement_resampling_speaker → i2s_audio_speaker.
  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - lambda: |-
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }

  # TODO va-direct: timer queries used voice_assistant's get_timers() — va_client has no
  # such API yet. Stubbed; timer LED indication will not function until va_client exposes timers
  # (or HA pushes timer state over a different channel).
  - id: fetch_first_active_timer
    then:
      - lambda: 'ESP_LOGW("va-direct", "fetch_first_active_timer: not implemented");'

  - id: check_if_timers_active
    then:
      - lambda: 'id(is_timer_active) = false;  // TODO va-direct: no timer API on va_client yet'

  # DEAD CODE (va-direct): in the original yaml this script enabled the
  # stop wake word while external_media_player was announcing. We no
  # longer route TTS through external_media_player, so the wait_until
  # condition never fires. Stop word arming now lives in va_client's
  # on_phase handler (enable on phase=replying, disable otherwise).
  # Kept for diff readability with upstream; safe to delete once the
  # va-direct yaml is the only one.
  # Single disarm point for the "stop" wake word. Started on EVERY return to idle
  # (on_phase) and by on_followup_opened (request_follow_up). It waits out the
  # whole reply tail + follow-up listening window, then disarms "stop" — but only
  # if no new turn started meanwhile (a new reply OR a `listening` turn-start
  # calls script.stop on this; the turn's own return to idle restarts it).
  # mode: restart so each idle / follow-up restarts the timer.
  #
  # 12 s comfortably covers both window types: the automatic follow-up
  # (follow_up_listen_seconds, ~8 s) and a request_follow_up (kRequestFollowUpMs,
  # ~10 s) plus the mic-open delay + buffer. In the gap between the window closing
  # and this firing, "stop" stays armed but is a harmless no-op at idle.
  - id: followup_window_watchdog
    mode: restart
    then:
      - delay: 12000ms
      # Still at rest (idle) or still in the listening window (user never spoke)?
      # Then the turn + its follow-up are over — disarm stop and settle on idle.
      # If a new reply started, phase is replying/thinking here, so we leave stop
      # armed (and this watchdog was also cancelled on "replying").
      - if:
          condition:
            lambda: |-
              return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} ||
                     id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id};
          then:
            - micro_wake_word.disable_model: stop
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            - script.execute: control_leds

  - id: activate_stop_word_once
    then:
      - wait_until:
          condition:
            media_player.is_announcing:
              id: external_media_player
          timeout: 5s
      - delay: 1s
      # Enable stop wake word
      - if:
          condition:
            switch.is_off: timer_ringing
          then:
            - micro_wake_word.enable_model: stop
            - wait_until:
                not:
                  media_player.is_announcing:
                    id: external_media_player
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop

i2s_audio:
  - id: i2s_output
    # i2s_output data pin is gpio10
    i2s_lrclk_pin:
      number: GPIO7
    i2s_bclk_pin:
      number: GPIO8

  - id: i2s_input
    # data line is GPIO15
    i2s_lrclk_pin:
      number: GPIO14
    i2s_bclk_pin:
      number: GPIO13

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  # Hardware speaker output
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO10
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: never
    # va-direct: stock yaml uses 100ms because an FLAC/MP3 decoder fronts the
    # chain and buffers ahead. We push raw PCM live from a WS — jitter in
    # chunk arrival can starve a 100ms buffer between chunks, audible as a
    # hiss / silence gaps. Bump to 500ms.
    buffer_duration: 500ms
    audio_dac: aic3204_dac

  # va-direct: restored from stock — mixer wraps the i2s leaf, two resamplers
  # feed mixer inputs. The resampler/mixer chain handles 24k→48k upsample,
  # mono→stereo, 16→32bit expansion AND drives the i2s leaf with the right
  # startup handshake (which raw speaker.play() on the leaf was failing).
  # va_client writes 24k mono pcm16 into announcement_resampling_speaker.
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  # NOTE: the resampler platform has NO 'timeout' option (only the mixer SOURCES
  # do). The resampler self-stops when idle between replies, which cold-starts it
  # on the next reply → start-of-answer click. That cold-start needs a firmware
  # (va_client) fix (prime/keep-warm), not config — see roadmap.
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

media_player:
  - platform: speaker_source
    id: external_media_player
    name: Media Player
    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    # Mirror the media_player volume / mute state into va_client so the
    # device's physical +/- buttons and mute switch scale our TTS output.
    # (No api: block on this firmware — there's no HA-side slider, the
    # media_player exists only inside ESPHome.) Without this hook va_client
    # writes into media_resampling_speaker bypassing the media_player, so
    # the volume control would only affect chime announcements (wake /
    # mute / error) — not the assistant's voice.
    on_volume:
      - lambda: |-
          id(va).set_volume(id(external_media_player).is_muted() ? 0.0f
                                                                 : id(external_media_player).volume);
    on_mute:
      - lambda: 'id(va).set_volume(0.0f);'
    on_unmute:
      - lambda: 'id(va).set_volume(id(external_media_player).volume);'

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

audio_file:
  - id: center_button_press_sound
    file: ${center_button_press_sound_file}
  - id: center_button_double_press_sound
    file: ${center_button_double_press_sound_file}
  - id: center_button_triple_press_sound
    file: ${center_button_triple_press_sound_file}
  - id: center_button_long_press_sound
    file: ${center_button_long_press_sound_file}
  - id: factory_reset_initiated_sound
    file: ${factory_reset_initiated_sound_file}
  - id: factory_reset_cancelled_sound
    file: ${factory_reset_cancelled_sound_file}
  - id: factory_reset_confirmed_sound
    file: ${factory_reset_confirmed_sound_file}
  - id: jack_connected_sound
    file: ${jack_connected_sound_file}
  - id: jack_disconnected_sound
    file: ${jack_disconnected_sound_file}
  - id: mute_switch_on_sound
    file: ${mute_switch_on_sound_file}
  - id: mute_switch_off_sound
    file: ${mute_switch_off_sound_file}
  - id: timer_finished_sound
    file: ${timer_finished_sound_file}
  - id: wake_word_triggered_sound
    file: ${wake_word_triggered_sound_file}
  - id: easter_egg_tick_sound
    file: ${easter_egg_tick_sound_file}
  - id: easter_egg_tada_sound
    file: ${easter_egg_tada_sound_file}
  - id: error_cloud_expired
    file: ${error_cloud_expired_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000
  - platform: audio_http
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source
    fixed_delay: 480 microseconds  # The AIC3204 DAC used, as configured, on the VPE delays audio by 480 microseconds


voice_kit:
  id: voice_kit_component
  i2c_id: internal_i2c
  reset_pin: GPIO4
  firmware:
    url: https://github.com/esphome/voice-kit-xmos-firmware/releases/download/v1.3.1/ffva_v1.3.1_upgrade.bin
    version: "1.3.1"
    md5: 964635c5bf125529dab14a2472a15401

# Sendspin related components are pinned to specific commits for reproducible builds
external_components:
  - source:
      type: git
      url: https://github.com/esphome/home-assistant-voice-pe
      ref: dev
    components:
      - voice_kit
    refresh: 0s
  # va_client (the OpenAI-realtime thin client) lives in THIS repo. It is pulled
  # from GitHub (public, no token) so the config builds without a local checkout.
  # ref selects the channel (main = stable, dev = WIP); refresh: 0s = always
  # fetch the latest C++ for that ref. To iterate on the C++ locally instead,
  # swap this for:
  #   - source: {type: local, path: esphome/components}
  - source:
      type: git
      url: https://github.com/xandervanerven/home-assistant-voice-pe
      ref: dev
    components: [va_client]
    refresh: 0s

# va-direct: forward device logs to a UDP sink container on the Pi so they
# show up in Dozzle alongside the rest of the stack. See voice-pe-logs in
# home-infra/docker-compose.yml. Skip if the sink isn't running — sendto()
# fails silently and the device keeps running.
# va-direct: NTP wall clock for udp_log timestamps. Without this every JSON
# log line goes out without `time` and Dozzle has to stamp by packet
# arrival — fine but coarse. SNTP costs near-nothing.
time:
  - platform: sntp
    id: sntp_time

# udp_log removed: it forwarded logs to maxmaxme's Dozzle host (va.local),
# which doesn't exist on a normal network. With the host unresolved and
# DEBUG-level forwarding, the send path blocked the main loop and tripped the
# task watchdog -> boot loop. Re-add (with a host that exists on your LAN) only
# if you actually run a UDP log sink.

va_client:
  id: va
  url: ${va_url}
  microphone: i2s_mics
  mic_channel: 0
  # Handsfree barge-in: keep the mic open while the assistant is speaking so
  # you can talk over it and the backend's server VAD will cut the reply off.
  # Relies on the XMOS AEC to suppress speaker->mic echo (imperfect — see
  # CLAUDE.md). DISABLED: on this hardware the ~10x speaker->mic leak fed back
  # into the open mic during the reply, the (semantic) VAD flapped
  # listening<->thinking and once built into a loud acoustic-feedback squeal.
  # false = original turn-based behaviour (mic closed while replying; interrupt
  # only via the "stop" word or the center button) — clean turns, no feedback.
  barge_in: false
  # Write raw PCM16 mono 24kHz into the media resampler. We can't share the
  # announcement lane with external_media_player — va_client grabs the
  # resampling speaker on setup and holds it, which prevents the upstream
  # wake-chime / mute / error sounds (all played via media_player as
  # announcements) from reaching the i2s output. The media lane is otherwise
  # unused (no music pipeline configured), so it's effectively ours.
  speaker: media_resampling_speaker
  on_phase:
    - lambda: |-
        if (phase == "idle") {
          id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
        } else if (phase == "listening") {
          id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
        } else if (phase == "thinking") {
          id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
        } else if (phase == "replying") {
          id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
        }
    - script.execute: control_leds
    # va-direct: re-arm the wake word whenever we return to idle. micro_wake_word
    # is the sole owner that starts the i2s_mics stream in this fork, so this
    # guarantees detection is running again after every session teardown / WS
    # (re)connect, mirroring the reference's on_disconnected restart. Idempotent
    # if already running.
    - if:
        condition:
          lambda: 'return phase == "idle";'
        then:
          - micro_wake_word.start:
    # Arm "stop" for the WHOLE reply AND through the follow-up listening window —
    # not just while the backend says "replying". Two reasons:
    #  1) The backend bursts the reply; the device keeps playing the audio TAIL
    #     for a moment AFTER "idle", and the phase flaps replying<->thinking
    #     mid-reply. So we arm on "replying" and never disarm on those flaps.
    #  2) After every reply the device opens an automatic follow-up listening
    #     window (mic on). The user must be able to say "stop" during that window
    #     too. So we do NOT disarm on "idle" — that used to leave a dead gap over
    #     the tail + the whole follow-up window (the reported "stop doesn't work
    #     when it goes back to listening"). The disarm is handed to
    #     followup_window_watchdog, which fires only once the device has truly
    #     gone to rest (window expired, no new reply). A new reply cancels that
    #     watchdog and re-arms. Mirrors stock's "arm while audio plays", extended
    #     across our follow-up window.
    - if:
        condition:
          lambda: 'return phase == "replying";'
        then:
          - micro_wake_word.enable_model: stop
          - script.stop: followup_window_watchdog
    # A turn is in flight ("listening" = the server VAD heard the user speak,
    # OR the follow-up window just opened its listening LED): stop the disarm
    # watchdog that the preceding idle started. Without this it fires 12 s
    # after that idle — mid-turn if the user is still talking — and its
    # idle-or-listening condition matches, forcing phase/LED to idle and
    # disarming "stop" in the middle of the conversation. Stopping it here
    # also decouples the 12 s constant from follow_up_listen_seconds (windows
    # > ~11 s no longer get cut short). Every path still converges on a
    # disarm: each return to idle (incl. the window-expiry idle the firmware
    # fires) restarts the watchdog. The request_follow_up path is unaffected —
    # it sets the phase global directly (not via on_phase) and runs its own
    # watchdog from on_followup_opened.
    - if:
        condition:
          lambda: 'return phase == "listening";'
        then:
          - script.stop: followup_window_watchdog
    - if:
        condition:
          lambda: 'return phase == "idle";'
        then:
          - micro_wake_word.enable_model: stop
          - script.execute: followup_window_watchdog
  on_repeated_failure:
    # Backend has been unreachable for N reconnect attempts in a row.
    # Play the error chime once so the user knows something's wrong —
    # the LED is already in no_ha_connection (red twinkle) but that's
    # easy to miss across the room.
    - script.execute:
        id: play_sound
        priority: true
        # audio_file id is `error_cloud_expired` (no "_sound" suffix),
        # unlike the other chimes — original yaml inconsistency.
        sound_file: "error_cloud_expired"
  on_followup_opened:
    # Server's request_follow_up tool fired and va_client has waited
    # for the TTS hardware tail to clear (kTtsTailMs ≈ 800 ms after the
    # PSRAM ring drained). The mic is NOT yet open — we own the gating
    # here, exactly like the wake-word handler. Play the chime, wait
    # for it to actually finish through the speaker, then tell
    # va_client to open the mic. This keeps the listening LED honest
    # (it flips on at the same instant the mic does) and prevents the
    # chime tail from leaking through the XMOS AEC into the server VAD.
    - if:
        condition:
          switch.is_on: wake_sound
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "wake_word_triggered_sound"
          - wait_until:
              condition:
                not:
                  media_player.is_announcing:
                    id: external_media_player
              timeout: 2s
          # i2s_audio_speaker ring tail + room-echo decay. The wake path gets
          # away with 400 ms because the user speaks right after the chime and
          # any leaked tail merges into their turn; here the user typically
          # pauses ~1 s first, so a chime echo that survives the XMOS AEC
          # (~10x leak) arrives ALONE — the server VAD calls it a turn, the
          # silence after it commits, and the user's real answer then lands
          # mid-response. 800 ms lets the echo decay before the mic opens.
          # (Adopted from upstream maxmaxme 38be9c8, same reasoning verified.)
          - delay: 800ms
    - lambda: 'id(va)->commit_followup_mic();'
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
    # Arm the "stop" wake word so the user can abort if they changed
    # their mind ("отмени"/"stop"). on_phase only enables stop during
    # replying — during follow-up listening the server is silent until
    # the user speaks, so we have to enable it ourselves.
    - micro_wake_word.enable_model: stop
    # If the user stays silent, va_client closes the mic at kRequestFollowUpMs
    # but doesn't notify yaml — without this watchdog the LED would stay
    # in listening_for_command forever and `stop` would never disarm.
    - script.execute: followup_window_watchdog

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
    gain_factor: 4
  stop_after_detection: false
  models:
    # PERSONAL VARIANT: alexa-only start wake word (microWakeWord v2.1).
    # The stock start words (okay_nabu / hey_jarvis / hey_mycroft) were
    # removed on purpose. "stop" stays — it's the reliable barge-in/interrupt
    # word, armed only while the assistant is replying (see on_phase below).
    # kahrendt/microWakeWord redirects to the OHF-Voice org automatically.
    - model: https://github.com/kahrendt/microWakeWord/releases/download/v2.1_models/alexa.json
      id: alexa
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
      # The model ships with cutoff 0.5. Real "stop"s during a reply scored a
      # sliding-avg of only 0.62-0.67 (device logs), and in the quiet follow-up
      # window — XMOS AGC still recovering from the TTS playback level — they
      # stayed UNDER 0.5 and were missed without a trace, so the open mic
      # streamed the word to OpenAI, which answered it as a turn. 0.4 buys
      # detection margin; the false-accept exposure is contained because "stop"
      # is only armed during replies + the follow-up window (~20 s per turn).
      # TUNING KNOB: lower if stops still get missed, raise if it false-fires.
      probability_cutoff: 0.4
  # Permissive VAD gate. With the default threshold the VAD model repeatedly
  # vetoed REAL stop detections — device log shows "Wake word model predicts
  # 'Stop', but VAD model doesn't" 3x in a row before finally accepting
  # (+1.5 s latency, long enough for OpenAI to win the turn race during the
  # follow-up window). Keep the gate (it still blocks non-speech noise
  # triggers for "alexa") but make it easier to satisfy.
  vad:
    probability_cutoff: 0.3
  on_wake_word_detected:
    # TEMP DEBUG (va-direct): log EVERY detection BEFORE the mute guard, so the
    # next flash's log tells "mWW never fired" (mic/XMOS problem) apart from
    # "fired but swallowed by the mute switch". Remove once wake word is confirmed.
    - logger.log:
        format: "WAKE fired: '%s' (muted=%d)"
        args: ['wake_word.c_str()', 'id(master_mute_switch).state']
        level: WARN
    # If the wake word is detected when the device is muted (Possible with the software mute switch): Do nothing
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          # If a timer is ringing: Stop it, do not start the voice assistant (We can stop timer from voice!)
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                # The "stop" model is special — it's a cancel signal, not a
                # session-start. We want it to work in any non-idle phase:
                # during replying (current barge-in), but also during the
                # follow-up listening window (user changed their mind) and
                # while server VAD has us in listening/thinking (user wants
                # to abort their own utterance). mww reports the wake word
                # label, which has been observed as "Stop" (capital) on
                # this model — check both forms case-defensively.
                - if:
                    condition:
                      lambda: 'return wake_word == "Stop" || wake_word == "stop";'
                    then:
                      # Cancel anything in flight (reply, follow-up listening,
                      # user STT). send_interrupt() flushes the audio queue and
                      # tells the server to drop the response. No-op in idle.
                      - if:
                          condition:
                            lambda: 'return id(voice_assistant_phase) != ${voice_assist_idle_phase_id};'
                          then:
                            - lambda: 'id(va)->send_interrupt();'
                            - speaker.stop:
                                id: media_resampling_speaker
                            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
                            - script.execute: control_leds
                            - micro_wake_word.disable_model: stop
                    else:
                      # Non-stop wake word: branch on the assistant's current
                      # phase. Wake fired while replying = barge-in (interrupt
                      # the reply); idle/listening/thinking → fresh session.
                      - if:
                          condition:
                            lambda: 'return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};'
                          then:
                            # Interrupt the active reply. Flush the queue +
                            # stop the resampler so audio cuts immediately.
                            - lambda: 'id(va)->send_interrupt();'
                            - speaker.stop:
                                id: media_resampling_speaker
                            # Play the same wake chime as fresh-session so the
                            # user gets an audible cue that the mic actually
                            # reopened — without it the device just silences
                            # mid-reply and the user can't tell whether they
                            # need to repeat themselves. Skipped when the
                            # wake_sound switch is off.
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: "wake_word_triggered_sound"
                                  - wait_until:
                                      condition:
                                        not:
                                          media_player.is_announcing:
                                            id: external_media_player
                                      timeout: 2s
                                  # Downstream ring tail — keep the chime
                                  # off the mic so XMOS AEC doesn't leak it
                                  # back as "Ok, nabu" into the new turn.
                                  - delay: 400ms
                            # Open the mic locally. Used to rely on the
                            # bridge echoing phase=listening after interrupt;
                            # bridge no longer does that (it would also pop
                            # the mic open after a Stop), so we drive it
                            # explicitly here. start_session() is idempotent
                            # against the send_interrupt() above.
                            - lambda: 'id(va)->start_session();'
                            - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
                            - script.execute: control_leds
                          else:
                            # Backend down? Don't pretend to listen. Without
                            # this guard we'd play the wake chime + start
                            # streaming, on_mic_data_ would silently drop
                            # every frame (!ws_connected_), and 7 s later
                            # the no-speech watchdog would close the session
                            # — user has no idea why nothing happened.
                            # Play the same error chime as on_repeated_failure
                            # so the failure mode is audible.
                            - if:
                                condition:
                                  lambda: 'return !id(va)->is_connected();'
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: "error_cloud_expired"
                                else:
                                  # Regular wake word: play wake chime, start a new session.
                                  # Stop the TTS playback chain first. The previous turn may
                                  # still have downstream ring residual (~600 ms) even after
                                  # the server said phase=idle — start_session()'s internal
                                  # send_interrupt() flushes the PSRAM queue, but the leaf's
                                  # own ring buffers it can't reach. Without this stop the
                                  # tail of the old reply leaks under the wake chime.
                                  # No-op when there's nothing playing.
                                  - speaker.stop:
                                      id: media_resampling_speaker
                                  - if:
                                      condition:
                                        switch.is_on: wake_sound
                                      then:
                                        - script.execute:
                                            id: play_sound
                                            priority: true
                                            sound_file: "wake_word_triggered_sound"
                                        # Wait until the chime has actually finished
                                        # playing through the speaker — a fixed 300ms
                                        # delay was racing with the ~500ms FLAC and the
                                        # mic was streaming the chime tail to OpenAI
                                        # (which transcribed it as "Ok, nabu").
                                        - wait_until:
                                            condition:
                                              not:
                                                media_player.is_announcing:
                                                  id: external_media_player
                                            timeout: 2s
                                        # Downstream i2s_audio_speaker ring buffer is
                                        # still draining. 600 ms was conservative —
                                        # 400 ms covers the typical tail without
                                        # noticeable risk of the chime leaking into
                                        # the mic (XMOS AEC catches the residual).
                                        # Saves ~200 ms of "dead corridor" where the
                                        # user can't yet be heard.
                                        - delay: 400ms
                                  - lambda: 'id(va)->start_session();'
                                  # Show "waiting for command" (blue spin) immediately on wake,
                                  # before the server VAD detects actual speech. va_client's
                                  # on_phase will overwrite to phase 3 (listening_for_command)
                                  # once the server reports speech started.
                                  - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
                                  - script.execute: control_leds

select:
  - platform: template
    name: "Wake word sensitivity"
    id: wake_word_sensitivity
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      # Sets specific wake word probabilities computed for each particular model
      # Note probability cutoffs are set as a quantized uint8 value, each comment has the corresponding floating point cutoff
      # False Accepts per Hour values are tested against all units and channels from the Dinner Party Corpus.
      # PERSONAL VARIANT: only the alexa@v2.1 model is built in now, so the
      # three tiers just adjust its cutoff. Cutoffs are quantized uint8
      # (round(probability * 255)); LOWER = more sensitive = more false
      # accepts. Spacing mirrors the proven okay_nabu tiers.
      lambda: |-
        if (x == "Slightly sensitive") {
          id(alexa).set_probability_cutoff(217);   // ~0.85
        } else if (x == "Moderately sensitive") {
          id(alexa).set_probability_cutoff(178);   // ~0.70
        } else if (x == "Very sensitive") {
          id(alexa).set_probability_cutoff(140);   // ~0.55
        }


button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    internal: true
  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"

debug:
  update_interval: 5s
